name: test

on:
  pull_request:
  push:
    branches:
      - main
      - refactor/**
      - feature/**

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test tools
        run: python -m pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest
